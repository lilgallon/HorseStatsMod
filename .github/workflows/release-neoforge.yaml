name: release neoforge
on:
  push:
    tags:
      # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#filter-pattern-cheat-sheet
      # Examples: 3.5.0-MC26.2-neoforge, 3.4.0-MC1.21.11-neoforge
      - "[0-9]+.[0-9]+.[0-9]+-MC[0-9]+.[0-9x]+-neoforge"
      - "[0-9]+.[0-9]+.[0-9]+-MC[0-9]+.[0-9]+.[0-9x]+-neoforge"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Gradle Build
        run: ./gradlew :neoforge:build
      - name: Read project metadata
        id: project
        shell: bash
        run: echo "minecraft_version=$(sed -n 's/^minecraft_version=//p' gradle.properties)" >> "$GITHUB_OUTPUT"
      - name: Publish
        uses: Kira-NT/mc-publish@v3
        with:
          modrinth-id: RnxjxXAI
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 409126
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-files: neoforge/build/libs/*.jar

          files: neoforge/build/libs/!(*-@(dev|sources|javadoc)).jar
          name: Horse Statistics ${{ github.ref_name }}
          version: ${{ github.ref_name }}
          version-type: release
          changelog-file: CHANGELOG_NEOFORGE.md
          loaders: neoforge
          environment: client
          game-versions: ${{ steps.project.outputs.minecraft_version }}
